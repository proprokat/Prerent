name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
      - run: flutter --version
      - name: Build
        run: |
          cd /tmp
          flutter create --org com.prerent --project-name prerent --platforms android prerent_build
          cp $GITHUB_WORKSPACE/lib/*.dart prerent_build/lib/
          cp $GITHUB_WORKSPACE/lib/screens/*.dart prerent_build/lib/screens/
          cp $GITHUB_WORKSPACE/pubspec.yaml prerent_build/
          cd prerent_build
          flutter pub get
          flutter build apk --debug 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: prerent-apk
          path: /tmp/prerent_build/build/app/outputs/flutter-apk/app-debug.apk
