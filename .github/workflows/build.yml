name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
      - name: Build
        run: |
          # Create clean project
          rm -rf /tmp/myapp
          flutter create --org com.prerent --project-name prerent /tmp/myapp
          # Add dependencies one by one
          cd /tmp/myapp
          flutter pub add http intl shared_preferences fl_chart cupertino_icons
          # Copy our source files
          cp $GITHUB_WORKSPACE/lib/*.dart /tmp/myapp/lib/
          mkdir -p /tmp/myapp/lib/screens
          cp $GITHUB_WORKSPACE/lib/screens/*.dart /tmp/myapp/lib/screens/
          # Build
          flutter build apk --debug
          # Copy artifact
          mkdir -p $GITHUB_WORKSPACE/apk
          cp build/app/outputs/flutter-apk/app-debug.apk $GITHUB_WORKSPACE/apk/
      - uses: actions/upload-artifact@v4
        with:
          name: prerent-apk
          path: apk/app-debug.apk
