name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
      - run: flutter --version
      - run: |
          cd /tmp
          flutter create --org com.prerent --project-name prerent --platforms android prerent_app
          echo "=== COPIED FILES ==="
          ls -la prerent_app/lib/
      - run: |
          cp -r /tmp/prerent_app/android $GITHUB_WORKSPACE/
          cp -r /tmp/prerent_app/.gradle $GITHUB_WORKSPACE/ 2>/dev/null || true
          cd $GITHUB_WORKSPACE
          chmod +x android/gradlew 2>/dev/null || true
          echo "=== ANDROID DIR ==="
          ls -la android/
          flutter pub get
          echo "=== BUILD STARTED ==="
          flutter build apk --debug
          echo "=== BUILD COMPLETE ==="
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prerent-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
