name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
      - run: flutter --version
      - name: Full Build
        run: |
          set -e
          cd /tmp
          flutter create --org com.prerent --project-name prerent --platforms android prerent_app
          echo "=== FILES ==="
          ls -la /tmp/prerent_app/
          ls -la /tmp/prerent_app/android/ || echo "NO ANDROID DIR"
          
          mkdir -p /tmp/prerent_app/lib/screens
          cp $GITHUB_WORKSPACE/lib/*.dart /tmp/prerent_app/lib/
          cp $GITHUB_WORKSPACE/lib/screens/*.dart /tmp/prerent_app/lib/screens/
          cp $GITHUB_WORKSPACE/pubspec.yaml /tmp/prerent_app/
          
          cd /tmp/prerent_app
          flutter pub get
          flutter build apk --debug
          
          mkdir -p $GITHUB_WORKSPACE/build/app/outputs/flutter-apk/
          cp build/app/outputs/flutter-apk/app-debug.apk $GITHUB_WORKSPACE/build/app/outputs/flutter-apk/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prerent-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
