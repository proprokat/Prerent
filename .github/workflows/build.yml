name: Test Build
on: [push, workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
      - run: flutter doctor -v 2>&1 | tee /tmp/doctor.log
      - run: flutter create --platforms android /tmp/testapp && cd /tmp/testapp && flutter build apk --debug 2>&1 | tee /tmp/build.log
      - run: cat /tmp/doctor.log /tmp/build.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs
          path: /tmp/*.log
