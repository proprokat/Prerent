name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
      - run: flutter --version
      - name: Generate Android project
        run: |
          cd /tmp
          flutter create --project-name prerent --platforms android prerent_app
          cp -r prerent_app/android $GITHUB_WORKSPACE/
          cd $GITHUB_WORKSPACE
          cat prerent_app/pubspec.yaml | head -5
      - name: Get packages
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: prerent-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
