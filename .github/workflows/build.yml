name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
      - name: Create project
        run: rm -rf /tmp/app && flutter create --org com.prerent --project-name prerent /tmp/app
      - name: Add deps
        run: cd /tmp/app && flutter pub add http
      - name: Copy sources
        run: |
          cp $GITHUB_WORKSPACE/lib/main.dart /tmp/app/lib/
          cp $GITHUB_WORKSPACE/lib/api_client.dart /tmp/app/lib/
          mkdir -p /tmp/app/lib/screens
          cp $GITHUB_WORKSPACE/lib/screens/*.dart /tmp/app/lib/screens/ 2>/dev/null || true
      - name: Build APK
        run: cd /tmp/app && flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: prerent-apk
          path: /tmp/app/build/app/outputs/flutter-apk/app-debug.apk
