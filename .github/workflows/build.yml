name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
      - name: Build
        run: |
          # Save our source files
          mkdir -p /tmp/prerent_src/lib/screens
          cp lib/*.dart /tmp/prerent_src/lib/ 2>/dev/null || true
          cp lib/screens/*.dart /tmp/prerent_src/lib/screens/ 2>/dev/null || true
          cp pubspec.yaml /tmp/prerent_src/
          
          # Create fresh Flutter project
          cd /tmp
          rm -rf prerent_build
          flutter create --org com.prerent --project-name prerent --platforms android prerent_build
          
          # Copy our source files into it
          cp /tmp/prerent_src/pubspec.yaml prerent_build/
          cp /tmp/prerent_src/lib/*.dart prerent_build/lib/
          cp /tmp/prerent_src/lib/screens/*.dart prerent_build/lib/screens/
          
          # Build
          cd prerent_build
          flutter pub get
          flutter build apk --debug
          
          # Copy artifact back
          mkdir -p $GITHUB_WORKSPACE/apk
          cp build/app/outputs/flutter-apk/app-debug.apk $GITHUB_WORKSPACE/apk/
      - uses: actions/upload-artifact@v4
        with:
          name: prerent-apk
          path: apk/app-debug.apk
